version: "3.8"

# Brings up:
#   ClickHouse  → http://localhost:8123  (HTTP interface)
#   Metabase    → http://localhost:3000  (connect to ClickHouse via JDBC)
#
# Usage:
#   docker-compose up -d
#   python scripts/05_clickhouse_setup.py   ← load data
#   Open http://localhost:3000 → connect to ClickHouse (host: clickhouse, port: 8123)

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: credit_clickhouse
    ports:
      - "8123:8123"    # HTTP
      - "9000:9000"    # Native TCP
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  metabase:
    image: metabase/metabase:v0.49.0
    platform: linux/amd64
    container_name: credit_metabase
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: h2
      JAVA_OPTS: "-Xmx512m"
    depends_on:
      clickhouse:
        condition: service_healthy
    volumes:
      - metabase_data:/metabase-data

volumes:
  clickhouse_data:
  metabase_data:
